<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafaely Almeida — Portfólio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%236D4DE6'/><stop offset='100%25' stop-color='%2316B981'/></linearGradient></defs><circle cx='16' cy='16' r='14' fill='url(%23g)'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Inter serve de fallback caso o sistema não seja Apple; em Mac/iPhone o SF Pro entra automaticamente -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    /* LIGHT (fundo claro mantido) */
    --bg:#F6F5F2;
    --surface:#FFFFFF;
    --surface-2:#EFEDE8;
    --text:#1A1A1F;
    --text-soft:#5C5A66;
    --muted:#928F9B;
    --purple:#6D4DE6;
    --purple-deep:#5A3DD1;
    --green:#16B981;
    --green-deep:#0F9E6E;
    --hairline:rgba(26,26,31,0.10);
    --hairline-soft:rgba(26,26,31,0.06);
    --shadow:0 1px 2px rgba(26,26,31,.04),0 8px 30px rgba(26,26,31,.06);
    --shadow-hover:0 6px 14px rgba(109,77,230,.12),0 18px 50px rgba(26,26,31,.12);

    --maxw:1280px;
    --ease:cubic-bezier(.2,.7,.2,1);
  }
  [data-theme="dark"]{
    --bg:#121017;
    --surface:#1B1924;
    --surface-2:#23202E;
    --text:#F3F1F8;
    --text-soft:#B7B3C4;
    --muted:#7E7A8C;
    --purple:#9B82FF;
    --purple-deep:#8169FF;
    --green:#3CE6A6;
    --green-deep:#23D292;
    --hairline:rgba(243,241,248,0.12);
    --hairline-soft:rgba(243,241,248,0.07);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 34px rgba(0,0,0,.4);
    --shadow-hover:0 6px 16px rgba(155,130,255,.22),0 20px 54px rgba(0,0,0,.5);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--text);
    font-family:var(--font);font-size:17px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
    transition:background .4s var(--ease),color .4s var(--ease);
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(28px,7vw,48px)}
  .label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:60;
    background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:saturate(180%) blur(18px);
    border-bottom:1px solid var(--hairline-soft);
  }
  .nav{display:flex;align-items:center;justify-content:space-between;height:64px;gap:1rem}
  .brand{font-weight:800;font-size:1.12rem;letter-spacing:-.02em;display:flex;align-items:center;gap:.55rem}
  .brand .dot{width:10px;height:10px;border-radius:50%;
    background:linear-gradient(135deg,var(--purple),var(--green))}
  .brand .role{font-weight:400;font-size:.78rem;color:var(--muted);letter-spacing:0}
  .nav-right{display:flex;align-items:center;gap:.6rem}
  .btn-contact-nav{
    font-family:var(--font);font-size:.82rem;font-weight:600;cursor:pointer;
    padding:.5rem 1.1rem;border-radius:100px;
    border:1px solid var(--hairline);background:var(--surface);
    color:var(--text);transition:all .25s var(--ease);
    text-decoration:none;display:inline-flex;align-items:center;
  }
  .btn-contact-nav:hover{border-color:var(--purple);color:var(--purple)}

  .lang-toggle{display:flex;background:var(--surface-2);border-radius:100px;padding:3px;border:1px solid var(--hairline-soft)}
  .lang-toggle button{
    border:0;background:none;cursor:pointer;font-family:var(--font);
    font-size:.78rem;font-weight:700;color:var(--muted);
    padding:.32rem .7rem;border-radius:100px;transition:all .25s var(--ease);
  }
  .lang-toggle button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

  .theme-btn{
    width:38px;height:38px;border-radius:50%;border:1px solid var(--hairline);
    background:var(--surface);cursor:pointer;display:grid;place-items:center;
    color:var(--text);transition:all .3s var(--ease);box-shadow:var(--shadow)
  }
  .theme-btn:hover{transform:translateY(-1px);border-color:var(--purple)}
  .theme-btn svg{width:18px;height:18px}
  .theme-btn .moon{display:none}
  [data-theme="dark"] .theme-btn .sun{display:none}
  [data-theme="dark"] .theme-btn .moon{display:block}

  /* ---------- Hero / Apresentação ---------- */
  .hero{
    padding:clamp(72px,12vw,148px) 0 clamp(56px,8vw,96px);
    text-align:center;
    position:relative;
    background:
      radial-gradient(ellipse 80% 60% at 15% 50%, color-mix(in srgb,var(--purple) 9%,transparent), transparent 70%),
      radial-gradient(ellipse 70% 50% at 85% 60%, color-mix(in srgb,var(--green) 8%,transparent), transparent 65%),
      var(--bg);
  }
  .hero::before,.hero::after{
    content:"";position:absolute;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent 0%,var(--purple) 25%,var(--green) 75%,transparent 100%);
    opacity:.6;
  }
  .hero::before{top:0}
  .hero::after{bottom:0}
  .hero .label{margin-bottom:1.6rem;display:inline-flex;align-items:center;gap:.6rem}
  .hero .label .av{width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 0 0 var(--green);animation:pulse 2.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--green) 60%,transparent)}70%{box-shadow:0 0 0 9px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .hero h1{
    font-weight:800;font-size:clamp(2.5rem,7.5vw,5.6rem);line-height:1.02;
    letter-spacing:-.03em;max-width:20ch;margin:0 auto;
  }
  .hero h1 .grad{
    background:linear-gradient(120deg,var(--purple),var(--green));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .hero p.sub{margin-top:1.6rem;max-width:52ch;font-size:1.18rem;color:var(--text-soft);line-height:1.55;margin-left:auto;margin-right:auto}
  .hero-actions{margin-top:2.4rem;display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center}
  .btn{
    font-family:var(--font);font-weight:600;font-size:.98rem;cursor:pointer;
    padding:.85rem 1.5rem;border-radius:100px;border:1px solid transparent;
    transition:all .28s var(--ease);display:inline-flex;align-items:center;gap:.5rem;
  }
  .btn-primary{background:var(--purple);color:#fff}
  .btn-primary:hover{background:var(--purple-deep);transform:translateY(-2px);box-shadow:var(--shadow-hover)}
  .btn-ghost{background:transparent;border-color:var(--hairline);color:var(--text)}
  .btn-ghost:hover{border-color:var(--text);transform:translateY(-2px)}

  /* ---------- Section head ---------- */
  .section{padding:clamp(40px,7vw,90px) 0}
  .sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:1.8rem}
  .sec-head h2{font-weight:800;font-size:clamp(1.5rem,3.4vw,2.3rem);letter-spacing:-.025em}
  .sec-head .count{color:var(--muted);font-size:.9rem;font-weight:500}

  /* ---------- Filters ---------- */
  .filters{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem}
  .filter{
    font-family:var(--font);font-size:.86rem;font-weight:600;cursor:pointer;
    padding:.5rem 1.05rem;border-radius:100px;border:1px solid var(--hairline);
    background:var(--surface);color:var(--text-soft);transition:all .25s var(--ease);
  }
  .filter:hover{border-color:var(--purple);color:var(--text)}
  .filter.active{background:var(--text);color:var(--bg);border-color:var(--text)}

  /* ---------- Grid de projetos ---------- */
  .masonry{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(16px,2vw,24px)}
  @media(max-width:1100px){.masonry{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:760px){.masonry{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.masonry{grid-template-columns:1fr}}
  .card{
    background:var(--surface);border-radius:18px;overflow:hidden;
    box-shadow:var(--shadow);border:1px solid var(--hairline-soft);
    cursor:pointer;transition:transform .4s var(--ease),box-shadow .4s var(--ease);
    position:relative;opacity:0;transform:translateY(22px);
  }
  .card.in{opacity:1;transform:none}
  .card:hover{transform:translateY(-5px);box-shadow:var(--shadow-hover)}
  .card .art{width:100%;position:relative}
  .card .art::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.45));
    opacity:0;transition:opacity .35s var(--ease)
  }
  .card:hover .art::after{opacity:1}
  .card .save{
    position:absolute;top:12px;right:12px;z-index:3;
    background:var(--purple);color:#fff;font-weight:700;font-size:.78rem;
    padding:.45rem .8rem;border-radius:100px;opacity:0;transform:translateY(-6px);
    transition:all .3s var(--ease);
  }
  .card:hover .save{opacity:1;transform:none}
  .card .meta{padding:.95rem 1.05rem 1.1rem}
  .card .meta h3{font-weight:700;font-size:1.05rem;letter-spacing:-.01em}
  .card .meta .row{display:flex;justify-content:space-between;align-items:center;margin-top:.35rem}
  .card .meta .cat{font-size:.76rem;font-weight:600;color:var(--purple)}
  .card .meta .yr{font-size:.76rem;color:var(--muted)}
  .card.hide{display:none}

  /* gradientes placeholder (roxo/verde) — troque por suas imagens */
  .g1{background:linear-gradient(140deg,#6D4DE6,#9B82FF 60%,#16B981)}
  .g2{background:linear-gradient(160deg,#0F9E6E,#16B981 55%,#A7F3D0)}
  .g3{background:conic-gradient(from 200deg at 60% 40%,#6D4DE6,#16B981,#9B82FF,#6D4DE6)}
  .g4{background:radial-gradient(80% 80% at 30% 20%,#9B82FF,transparent 60%),linear-gradient(160deg,#2a1f55,#16B981)}
  .g5{background:linear-gradient(135deg,#5A3DD1,#6D4DE6 50%,#3CE6A6)}
  .g6{background:radial-gradient(70% 70% at 70% 30%,#16B981,transparent 60%),linear-gradient(150deg,#6D4DE6,#23202E)}

  /* ---------- Sobre ---------- */
  .about{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch;overflow:hidden;border-radius:20px;background:var(--surface);box-shadow:var(--shadow)}
  .about-text{padding:clamp(24px,3.5vw,40px);display:flex;flex-direction:column;justify-content:center;gap:0}
  .about-accent{width:28px;height:3px;background:linear-gradient(90deg,var(--purple),var(--green));border-radius:2px;margin-bottom:.9rem}
  .about-text .label{margin-bottom:.5rem;display:inline-flex;align-items:center;gap:.6rem}
  .about-text h2{font-weight:800;font-size:clamp(1.35rem,2.6vw,1.9rem);letter-spacing:-.025em;margin-bottom:.9rem;line-height:1.15}
  .about-sub{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:.7rem!important}
  .about-text p{color:var(--text-soft);font-size:.95rem;line-height:1.65;margin-bottom:.8rem}
  .about-text p:last-of-type{margin-bottom:1.2rem}
  .about-tags{display:flex;flex-wrap:wrap;gap:.4rem}
  .about-tag{font-size:.75rem;font-weight:600;padding:.3rem .75rem;border-radius:100px;
    border:1px solid var(--hairline);color:var(--text-soft);background:var(--bg)}
  .about-photo{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--purple),var(--green));padding:0;border-radius:0;box-shadow:none;aspect-ratio:unset;min-height:100%}
  .about-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:0}
  .about-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,color-mix(in srgb,var(--purple) 18%,transparent) 0%,transparent 55%);pointer-events:none}

  /* ---------- Overlay de projeto ---------- */
  .proj-overlay{
    position:fixed;inset:0;z-index:200;
    display:flex;align-items:flex-end;justify-content:center;
    background:rgba(0,0,0,0);
    visibility:hidden;pointer-events:none;
    transition:background .35s var(--ease),visibility 0s .36s;
  }
  .proj-overlay.open{
    background:rgba(0,0,0,.6);
    visibility:visible;pointer-events:all;
    transition:background .35s var(--ease),visibility 0s 0s;
  }
  .proj-panel{
    width:100%;max-height:96vh;
    background:var(--bg);border-radius:24px 24px 0 0;
    overflow-y:auto;overscroll-behavior:contain;
    transform:translateY(100%);transition:transform .42s var(--ease);
    box-shadow:0 -8px 40px rgba(0,0,0,.22);
  }
  @media(min-width:700px){
    .proj-overlay{align-items:flex-end}
    .proj-panel{max-width:1100px;max-height:94vh;border-radius:24px 24px 0 0;margin:0 auto}
  }
  .proj-overlay.open .proj-panel{transform:translateY(0)}
  .proj-header{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding:1.1rem 1.4rem;
    background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(14px);border-bottom:1px solid var(--hairline-soft);
  }
  .proj-header .proj-cat{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--purple)}
  .proj-close{
    width:36px;height:36px;border-radius:50%;border:1px solid var(--hairline);
    background:var(--surface);cursor:pointer;display:grid;place-items:center;
    color:var(--text);font-size:1.1rem;line-height:1;transition:all .2s var(--ease);
  }
  .proj-close:hover{border-color:var(--text)}
  .proj-body{padding:1.6rem 1.4rem 2.4rem}
  .proj-body h2{font-weight:800;font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:-.025em;margin-bottom:.7rem}
  .proj-desc{font-size:1rem;color:var(--text-soft);line-height:1.7;max-width:60ch;margin-bottom:2rem}
  .proj-images{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
  .proj-images.stack{grid-template-columns:1fr}
  .proj-img-ph{
    width:100%;border-radius:12px;overflow:hidden;
    background:var(--surface-2);border:1px solid var(--hairline-soft);
  }
  .proj-img-ph img{width:100%;height:auto;display:block;object-fit:contain}

  /* ---------- Contato / footer (placeholder, copy depois) ---------- */
  .contact{background:var(--surface);border:1px solid var(--hairline-soft);border-radius:24px;padding:clamp(36px,6vw,72px);text-align:center;box-shadow:var(--shadow)}
  .contact h2{font-weight:800;font-size:clamp(1.8rem,5vw,3.2rem);letter-spacing:-.025em;margin-bottom:1.4rem}
  .contact h2 .grad{background:linear-gradient(120deg,var(--purple),var(--green));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .contact .email{display:inline-block;margin-top:.4rem}
  .contact .socials{margin-top:2rem;display:flex;gap:1.4rem;justify-content:center;flex-wrap:wrap}
  .contact .socials a{font-weight:600;color:var(--text-soft);transition:color .25s}
  .contact .socials a:hover{color:var(--purple)}
  footer{padding:3rem 0;text-align:center;color:var(--muted);font-size:.85rem}

  /* ---------- Animações de entrada (scroll reveal) ---------- */
  .ob{opacity:0;transform:translateY(28px);transition:opacity .65s var(--ease),transform .65s var(--ease)}
  .ob.in{opacity:1;transform:none}

  /* Hero — entrada escalonada no load */
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .hero .label{animation:fadeUp .6s var(--ease) .1s both}
  .hero h1{animation:fadeUp .7s var(--ease) .22s both}
  .hero p.sub{animation:fadeUp .7s var(--ease) .38s both}
  .hero-actions{animation:fadeUp .7s var(--ease) .52s both}

  /* About — texto esquerda entra, foto direita aparece */
  .about-text{opacity:0;transform:translateX(-24px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
  .about-text.in{opacity:1;transform:none}
  .about-photo{opacity:0;transition:opacity .8s var(--ease) .15s}
  .about-photo.in{opacity:1}

  /* Tags — escalonadas */
  .about-tag{opacity:0;transform:translateY(8px);transition:opacity .4s var(--ease),transform .4s var(--ease)}
  .about-tag.in{opacity:1;transform:none}

  /* Cards — zoom na imagem ao hover */
  .card .art{overflow:hidden}
  .card .art > *,.card .art{transition:transform .5s var(--ease)}
  .card:hover .art{transform:scale(1.02)}

  /* Botões — press feedback */
  .btn:active{transform:scale(.97)!important}
  .filter:active{transform:scale(.95)}

  /* Filtros — entrada escalonada */
  .filter{opacity:0;transform:translateY(6px);transition:opacity .35s var(--ease),transform .35s var(--ease),border-color .25s var(--ease),color .25s var(--ease),background .25s var(--ease)}
  .filter.in{opacity:1;transform:none}

  /* Nav — dot pulsa ao hover na brand */
  .brand:hover .dot{animation:none;transform:scale(1.3);transition:transform .2s var(--ease)}

  /* Seção de contato */
  .contact{transition:box-shadow .4s var(--ease)}
  .contact:hover{box-shadow:0 8px 40px rgba(109,77,230,.1),0 2px 8px rgba(0,0,0,.04)}

  /* ---------- Responsivo ---------- */
  @media(max-width:760px){
    .btn-contact-nav{display:none}
    .about{grid-template-columns:1fr;border-radius:16px}
    .about-photo{min-height:260px;aspect-ratio:4/3}
    .about-photo img{object-position:top center}
  }
  @media(max-width:600px){
    /* respiro lateral — aplicado direto no main e header */
    main{padding:0 28px}
    .wrap{padding-left:0;padding-right:0}
    header .nav{padding:0 28px}
    footer{padding:2rem 28px}
    .nav{height:56px}
    .brand .role{display:none}

    /* hero — centralizado, fontes maiores */
    .hero{padding:56px 0 48px;text-align:center}
    .hero .label{margin-bottom:1.4rem}
    .hero h1{font-size:clamp(2.4rem,9vw,3rem);max-width:none;line-height:1.05}
    .hero p.sub{font-size:1.05rem;margin-top:1.2rem;max-width:none}
    .hero-actions{margin-top:1.8rem;flex-direction:column;align-items:center;gap:.7rem}
    .btn{width:100%;justify-content:center;padding:.9rem 1.4rem;font-size:1rem}

    /* seções */
    .section{padding:48px 0}
    .sec-head{flex-direction:column;align-items:flex-start;gap:.25rem;margin-bottom:1.2rem}
    .sec-head h2{font-size:1.7rem}
    .sec-head .count{font-size:.88rem}

    /* filtros */
    .filters{gap:.4rem;margin-bottom:1.4rem}
    .filter{font-size:.85rem;padding:.45rem 1rem}

    /* cards */
    .masonry{columns:2;column-gap:14px}
    .card{border-radius:14px;margin-bottom:14px}
    .card .meta{padding:.8rem .9rem .9rem}
    .card .meta h3{font-size:1rem}
    .card .meta .cat,.card .meta .yr{font-size:.8rem}

    /* sobre */
    .about{border-radius:14px}
    .about-text{padding:24px 20px}
    .about-text h2{font-size:1.6rem}
    .about-text p{font-size:1rem;line-height:1.65}
    .about-tags{gap:.4rem}
    .about-tag{font-size:.82rem;padding:.38rem .9rem}

    /* contato */
    .contact{border-radius:20px;padding:32px 24px}
    .contact h2{font-size:1.7rem;margin-bottom:1.2rem}
    .contact .email{font-size:.92rem;padding:.85rem 1.2rem;word-break:break-all}
    .contact .socials{margin-top:1.4rem;gap:1.1rem;font-size:.9rem}

    footer{padding:2rem 0;font-size:.85rem}
  }
  @media(max-width:400px){
    .lang-toggle button{padding:.28rem .5rem;font-size:.72rem}
    .theme-btn{width:32px;height:32px}
    .theme-btn svg{width:15px;height:15px}
    .masonry{columns:1}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.card,.ob{opacity:1;transform:none}}
  :focus-visible{outline:2px solid var(--purple);outline-offset:3px;border-radius:4px}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="#top" class="brand"><span class="dot"></span>Rafaely Almeida<span class="role">Brand designer</span></a>
    <div class="nav-right">
      <a href="#contato" class="btn-contact-nav" data-i18n="navContact">Entrar em contato</a>
      <div class="lang-toggle" role="group" aria-label="Idioma / Language">
        <button id="lang-pt" class="active" onclick="setLang('pt')">PT</button>
        <button id="lang-en" onclick="setLang('en')">EN</button>
      </div>
      <button class="theme-btn" onclick="toggleTheme()" aria-label="Alternar modo claro/escuro">

  /* Rótulos das categorias (PT/EN) */

  /* =====================================================================
     2) TEXTOS DA PÁGINA (PT/EN) — copy provisória, lapidamos juntos depois.
        Troque [Seu Nome] pelo seu nome real.
     ===================================================================== */
  const i18n = {
    pt:{
      badge:"Disponível para novos projetos",
      heroTitle:'Designs que<br><span class="grad">ficam na memória.</span><span style="display:block;font-size:.52em;font-weight:500;letter-spacing:-.01em;color:var(--text-soft);margin-top:.15em">por Rafaely Almeida</span>',
      heroSub:"Tudo que sua marca precisa pra <b>existir com consistência</b> em qualquer canal: identidade visual, campanhas, redes sociais, landing pages e peças offline.",
      navContact:"Entrar em contato",
      ctaWork:"Ver trabalhos", ctaTalk:"Falar comigo",
      aboutLabel:"Sobre mim",
      aboutTitle:"Design com propósito,<br>entregue com cuidado.",
      aboutSub:"Prazer, sou a Rafa, designer há mais de 8 anos. 🙂",
      aboutP1:"Minha história nesse ramo começou cedo, muito antes de eu saber que tinha nome. Sempre gostei de edição e criava artes do zero por pura intuição. Na adolescência, comecei a criar peças para a minha igreja local como voluntária e foi ali que tudo fez sentido, descobri que <b>design era minha aptidão.</b>",
      aboutP2:"Desde então, entendi que design não é só beleza: ele é <b>estratégico, consistente e precisa fazer sentido pra quem o vê;</b> e para isso, você pode contar comigo!",
      workTitle:"Trabalhos", contactPre:"Vamos", contactHi:"conversar?",
      contactBtn:"Entrar em contato",
      countSuffix:{one:"projeto",many:"projetos"}, saveBtn:"Ver"
    },
    en:{
      badge:"Available for new projects",
      heroTitle:'Design that<br><span class="grad">sticks with you.</span><span style="display:block;font-size:.52em;font-weight:500;letter-spacing:-.01em;color:var(--text-soft);margin-top:.15em">by Rafaely Almeida</span>',
      heroSub:"Graphic, web, identity, campaigns — I turn ideas into brands people actually remember. Let's make something together?",
      navContact:"Get in touch",
      ctaWork:"View work", ctaTalk:"Get in touch",
      aboutLabel:"About me",
      aboutTitle:"Design with purpose,<br>delivered with care.",
      aboutP1:"I'm Rafaely Almeida, a Brand Designer with a trained eye for building brands that stand out — and stick. I work with businesses and professionals who want to move beyond generic and build a visual presence that truly communicates who they are.",
      aboutP2:"From brief to delivery, I take care of every detail. I believe great design isn't just beautiful — it's strategic, consistent, and meaningful to whoever sees it.",
      workTitle:"Work", contactPre:"Let's", contactHi:"talk?",
      contactBtn:"Get in touch",
      countSuffix:{one:"project",many:"projects"}, saveBtn:"Open"
    }
  };

  /* ---------- estado ---------- */
  let lang = "pt";
  let filter = "all";

  /* ---------- tema ---------- */
  function toggleTheme(){
    const el=document.documentElement;
    el.setAttribute("data-theme", el.getAttribute("data-theme")==="dark"?"light":"dark");
  }

  /* ---------- idioma ---------- */
  function setLang(l){
    lang=l;
    document.documentElement.lang = l==="pt"?"pt-BR":"en";
    document.getElementById("lang-pt").classList.toggle("active",l==="pt");
    document.getElementById("lang-en").classList.toggle("active",l==="en");
    document.querySelectorAll("[data-i18n]").forEach(el=>{
      const v=i18n[l][el.dataset.i18n];
      if(v!=null) el.innerHTML=v;
    });
    renderFilters(); renderGrid(); renderTags(l);
  }

  /* ---------- tags sobre ---------- */
  const tags = {
    pt:["Identidade Visual","Branding","Design Gráfico","Web Design","Campanhas","Redes Sociais","Landing Pages","Peças Offline"],
    en:["Visual Identity","Branding","Graphic Design","Web Design","Campaigns","Social Media","Landing Pages","Offline Materials"]
  };
  function renderTags(l){
    const box=document.getElementById("about-tags");
    if(!box) return;
    box.innerHTML="";
    tags[l].forEach(t=>{
      const s=document.createElement("span");
      s.className="about-tag";
      s.textContent=t;
      box.appendChild(s);
    });
  }

  /* ---------- filtros ---------- */
  function renderFilters(){
    const cats=["all",...new Set(projects.map(p=>p.cat))];
    const box=document.getElementById("filters");
    box.innerHTML="";
    cats.forEach(c=>{
      const b=document.createElement("button");
      b.className="filter"+(c===filter?" active":"");
      b.textContent=(catLabels[c]?catLabels[c][lang]:c);
      b.onclick=()=>{filter=c;renderFilters();renderGrid();};
      box.appendChild(b);
    });
  }

  /* ---------- mural ---------- */
  function renderGrid(){
    const grid=document.getElementById("grid");
    grid.innerHTML="";
    const list=projects.filter(p=>filter==="all"||p.cat===filter);
    list.forEach((p,i)=>{
      const card=document.createElement("article");
      card.className="card";
      card.style.transitionDelay=(i%4*0.05)+"s";
      card.innerHTML=`
        <div class="art ${p.img?'':''+p.art}" style="aspect-ratio:${p.ratio}${p.img?';background:var(--surface)':''}">
          ${p.img?`<img src="${p.img}" alt="${p.title[lang]}" style="width:100%;height:100%;object-fit:cover;display:block;">`:''}
          <span class="save">${i18n[lang].saveBtn}</span>
        </div>
        <div class="meta">
          <h3>${p.title[lang]}</h3>
          <div class="row">
            <span class="cat">${catLabels[p.cat]?catLabels[p.cat][lang]:p.cat}</span>
            <span class="yr">${p.year}</span>
          </div>
        </div>`;
      card.onclick=()=>openProject(p);
      grid.appendChild(card);
    });
    const n=list.length, suf=i18n[lang].countSuffix;
    document.getElementById("count").textContent=
      String(n).padStart(2,"0")+" "+(n===1?suf.one:suf.many);
    requestAnimationFrame(()=>{
      document.querySelectorAll(".card").forEach(c=>obIO.observe(c));
      observeFilters();
    });
  }

  /* ---------- reveal ---------- */
  const obIO=new IntersectionObserver(es=>{
    es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");obIO.unobserve(e.target);}});
  },{threshold:.1});
  document.querySelectorAll(".ob").forEach(el=>obIO.observe(el));

  /* about — foto e texto deslizam de lados opostos */
  const abIO=new IntersectionObserver(es=>{
    es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");abIO.unobserve(e.target);}});
  },{threshold:.15});
  document.querySelectorAll(".about-photo,.about-text").forEach(el=>abIO.observe(el));

  /* tags — escalonadas */
  const tagIO=new IntersectionObserver(es=>{
    es.forEach(e=>{
      if(e.isIntersecting){
        e.target.querySelectorAll(".about-tag").forEach((t,i)=>{
          t.style.transitionDelay=(i*.04)+"s";
          t.classList.add("in");
        });
        tagIO.unobserve(e.target);
      }
    });
  },{threshold:.2});
  const tagsEl=document.getElementById("about-tags");
  if(tagsEl) tagIO.observe(tagsEl);

  /* filtros — escalonados */
  function observeFilters(){
    document.querySelectorAll(".filter").forEach((f,i)=>{
      f.style.transitionDelay=(i*.06)+"s";
      obIO.observe(f);
    });
  }

  /* ---------- init ---------- */
  /* ---------- overlay projeto ---------- */
  const overlay=document.getElementById("projOverlay");
  const imgHeights=["aspect-ratio:4/5","aspect-ratio:3/2","aspect-ratio:16/9","aspect-ratio:1/1"];

  function openProject(p){
    document.getElementById("projCat").textContent=(catLabels[p.cat]?catLabels[p.cat][lang]:p.cat)+" · "+p.year;
    document.getElementById("projTitle").textContent=p.title[lang];
    document.getElementById("projDesc").innerHTML=p.desc[lang]||"";
    document.getElementById("projDesc").style.display=p.desc[lang]?"":"none";
    const box=document.getElementById("projImages");
    box.className="proj-images"+(p.imgLayout==="stack"?" stack":"");
    box.innerHTML="";
    p.imgs.forEach((src,i)=>{
      const d=document.createElement("div");
      const isReal=src.includes(".");
      if(isReal){
        d.className="proj-img-ph";
        const im=document.createElement("img");
        im.src=src; im.alt="";
        d.appendChild(im);
      } else {
        d.className="proj-img-ph "+src;
        d.style.cssText=imgHeights[i%imgHeights.length]+";min-height:180px";
      }
      box.appendChild(d);
    });
    overlay.classList.add("open");
    document.body.style.overflow="hidden";
    document.getElementById("projPanel").scrollTop=0;
  }

  function closeProject(){
    overlay.classList.remove("open");
    document.body.style.overflow="";
  }

  overlay.addEventListener("click",e=>{if(e.target===overlay)closeProject()});
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeProject()});

  setLang("pt");
</script>
